<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sérénité Trésorerie — AB RENOV 35</title>
<style>
  :root {
    --navy: #162D49;
    --beige: #F3EAE2;
    --lavande: #A495C3;
    --lavande-light: #C8BFD9;
    --white: #FFFFFF;
    --green: #2ECC71;
    --green-dark: #1aab58;
    --red: #E74C3C;
    --red-dark: #c0392b;
    --text-muted: #6B7A8D;
    --radius: 14px;
    --radius-sm: 9px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--navy);
    color: #fff;
  }

  /* LAYOUT : header fixe + contenu flex */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    flex-shrink: 0;
    background: var(--navy);
    padding: 10px 16px 6px;
    border-bottom: 3px solid transparent;
    border-image: linear-gradient(90deg, var(--lavande), var(--navy)) 1;
  }
  .logo-main {
    font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    color: #fff;
  }
  .logo-sub {
    font-size: 0.6rem;
    color: var(--lavande-light);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* BODY SCROLL ZONE */
  .body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }

  /* INDICATEUR PRINCIPAL */
  .indicator-card {
    border-radius: var(--radius);
    padding: 16px 12px 14px;
    text-align: center;
    transition: background 0.4s;
    position: relative;
    overflow: hidden;
  }
  .indicator-card.green { background: linear-gradient(135deg, #1aab58, #2ECC71); }
  .indicator-card.red   { background: linear-gradient(135deg, #c0392b, #E74C3C); }
  .indicator-card.neutral { background: #1e3d63; }

  .ind-status {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 1;
    font-size: 0.72rem;
    margin-bottom: 6px;
  }

  /* MOIS : élément star */
  .ind-mois-wrap {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin: 2px 0 4px;
  }
  .ind-mois-val {
    font-size: 4.2rem;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .ind-mois-unit {
    font-size: 1.1rem;
    font-weight: 600;
    opacity: 0.85;
    padding-bottom: 6px;
  }
  .ind-mois-label {
    font-size: 0.7rem;
    opacity: 0.8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .ind-icon {
    font-size: 1.6rem;
    margin-bottom: 2px;
    display: block;
  }

  /* MÉTRIQUES SOUS L'INDICATEUR */
  .metrics-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .metric {
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
  }
  .metric-val {
    font-size: 1.05rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
  }
  .metric-lbl {
    font-size: 0.6rem;
    opacity: 0.9;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* COMMENTAIRE IA */
  .ai-card {
    background: rgba(255,255,255,0.07);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    border-left: 3px solid var(--lavande);
  }
  .ai-lbl {
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.95);
    margin-bottom: 5px;
  }
  .ai-text {
    font-size: 0.78rem;
    line-height: 1.55;
    color: rgba(255,255,255,0.95);
    font-style: italic;
  }

  /* FORMULAIRE */
  .form-card {
    background: rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 12px;
  }
  .form-title {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--lavande-light);
    margin-bottom: 10px;
  }
  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .field.full { grid-column: span 2; }
  .field label {
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--lavande-light);
    letter-spacing: 0.04em;
  }
  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .input-wrap span {
    position: absolute;
    right: 10px;
    font-size: 0.8rem;
    color: var(--lavande-light);
    pointer-events: none;
    font-weight: 500;
  }
  input[type="number"] {
    width: 100%;
    padding: 9px 28px 9px 10px;
    border: 1.5px solid rgba(164,149,195,0.3);
    border-radius: 8px;
    font-size: 0.92rem;
    font-weight: 700;
    color: #fff;
    background: rgba(255,255,255,0.08);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    border-color: var(--lavande);
    box-shadow: 0 0 0 3px rgba(164,149,195,0.2);
    background: rgba(255,255,255,0.12);
  }
  input[type="number"]::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; }

  .btn-calc {
    margin-top: 10px;
    width: 100%;
    padding: 13px;
    background: var(--lavande);
    color: var(--navy);
    font-size: 0.88rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-calc:hover { background: #b8aad4; }
  .btn-calc:active { transform: scale(0.98); }

  /* PLACEHOLDER état initial */
  .placeholder {
    text-align: center;
    padding: 10px 0 4px;
    opacity: 0.4;
    font-size: 0.8rem;
  }

  /* SPINNER */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-main">AB RENOV 35</div>
    <div class="logo-sub">Indice de Sérénité Trésorerie</div>
  </div>

  <div class="body">

    <!-- INDICATEUR -->
    <div class="indicator-card neutral" id="indicCard" style="display:none">
      <div class="ind-status" id="indStatus"></div>
      <div class="ind-mois-wrap">
        <div class="ind-mois-val" id="indMois"></div>
        <div class="ind-mois-unit" id="indMoisUnit"></div>
      </div>
      <div class="ind-mois-label" id="indMoisLabel">mois de couverture de trésorerie</div>
      <div class="metrics-row" id="metricsRow" style="display:none">
        <div class="metric">
          <div class="metric-val" id="mCapacity"></div>
          <div class="metric-lbl">Capacité élargie</div>
        </div>
        <div class="metric">
          <div class="metric-val" id="mBesoin"></div>
          <div class="metric-lbl">Besoin mensuel</div>
        </div>
      </div>
    </div>

    <!-- COMMENTAIRE IA -->
    <div class="ai-card" id="aiCard" style="display:none">
      <div class="ai-lbl">💬 Commentaire du jour</div>
      <div class="ai-text" id="aiText">
        <span class="spinner" id="aiSpinner" style="display:none"></span>
        <span id="aiContent"></span>
      </div>
    </div>

    <!-- FORMULAIRE -->
    <div class="form-card">
      <div class="form-title">Saisie des données</div>
      <div class="fields">
        <div class="field">
          <label>Compte courant</label>
          <div class="input-wrap">
            <input type="number" id="courant" placeholder="0" step="100" inputmode="decimal">
            <span>€</span>
          </div>
        </div>
        <div class="field">
          <label>Compte épargne</label>
          <div class="input-wrap">
            <input type="number" id="epargne" placeholder="0" step="100" inputmode="decimal">
            <span>€</span>
          </div>
        </div>
        <div class="field">
          <label>Créances certaines</label>
          <div class="input-wrap">
            <input type="number" id="creances" placeholder="0" step="100" inputmode="decimal">
            <span>€</span>
          </div>
        </div>
        <div class="field">
          <label>Découvert autorisé</label>
          <div class="input-wrap">
            <input type="number" id="decouvert" value="25000" step="500" inputmode="decimal">
            <span>€</span>
          </div>
        </div>
        <div class="field full">
          <label>Besoin mensuel de référence</label>
          <div class="input-wrap">
            <input type="number" id="besoin" value="70000" step="500" inputmode="decimal">
            <span>€</span>
          </div>
        </div>
      </div>
      <button class="btn-calc" onclick="calculate()">Calculer l'indice</button>
    </div>

  </div><!-- /body -->
</div><!-- /app -->

<script>
const fmt = n => new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', maximumFractionDigits:0}).format(n);
const $ = id => document.getElementById(id);

// ─── CONFIG ────────────────────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbykyQJ0L8IJ0USn2xDbWB12Wdcap0-mgiuA0ymnvtAQfiDKKksa1JuooevID_NHBjc0/exec';

// ─── PERSISTENCE ───────────────────────────────────────────────────────────
function loadLocal() {
  [['courant','ist_courant'],['epargne','ist_epargne'],['creances','ist_creances'],
   ['besoin','ist_besoin'],['decouvert','ist_decouvert']].forEach(([id, key]) => {
    const v = localStorage.getItem(key);
    if (v !== null && v !== '') $(id).value = v;
  });
}
function saveLocal() {
  [['courant','ist_courant'],['epargne','ist_epargne'],['creances','ist_creances'],
   ['besoin','ist_besoin'],['decouvert','ist_decouvert']].forEach(([id, key]) => {
    localStorage.setItem(key, $(id).value);
  });
}

async function loadFromGAS() {
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    if (data.courant !== '' && data.courant !== undefined) {
      [['courant',data.courant],['epargne',data.epargne],['creances',data.creances],
       ['decouvert',data.decouvert],['besoin',data.besoin]].forEach(([id, val]) => {
        if (val !== '' && val !== null && val !== undefined) $(id).value = val;
      });
      saveLocal();
      showSyncStatus('✓ Données synchronisées');
    }
  } catch(e) {
    loadLocal();
    showSyncStatus('⚠ Mode hors ligne', true);
  }
}

async function saveAll() {
  saveLocal();
  try {
    const params = new URLSearchParams({
      action: 'save',
      courant:   $('courant').value,
      epargne:   $('epargne').value,
      creances:  $('creances').value,
      decouvert: $('decouvert').value,
      besoin:    $('besoin').value
    });
    await fetch(GAS_URL + '?' + params.toString(), {mode:'no-cors'});
    showSyncStatus('✓ Données sauvegardées');
  } catch(e) {
    showSyncStatus('⚠ Sauvegarde locale uniquement', true);
  }
}

function showSyncStatus(msg, warn=false) {
  let el = $('syncStatus');
  if (!el) {
    el = document.createElement('div');
    el.id = 'syncStatus';
    el.style.cssText = 'text-align:center;font-size:0.62rem;padding:3px 0;transition:opacity 1s;';
    document.querySelector('.body').prepend(el);
  }
  el.style.color = warn ? '#ffb347' : '#7dff9e';
  el.style.opacity = '1';
  el.textContent = msg;
  setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

// ─── CALCULATE ─────────────────────────────────────────────────────────────
async function calculate() {
  const courant   = parseFloat($('courant').value)   || 0;
  const epargne   = parseFloat($('epargne').value)   || 0;
  const creances  = parseFloat($('creances').value)  || 0;
  const decouvert = parseFloat($('decouvert').value) || 0;
  const besoin    = parseFloat($('besoin').value)    || 70000;

  saveAll();

  const capacity = courant + epargne + decouvert + creances;
  const mois     = besoin > 0 ? capacity / besoin : 0;
  const isGreen  = capacity >= besoin;

  // Indicateur
  const card = $('indicCard');
  card.style.display = 'block';
  card.className = 'indicator-card ' + (isGreen ? 'green' : 'red');
  $('indStatus').textContent = isGreen ? '✅  SITUATION VERTE' : '🔴  SITUATION ROUGE';

  // MOIS en grand
  $('indMois').textContent = mois.toFixed(1);
  $('indMoisUnit').textContent = 'mois';
  $('indMoisLabel').textContent = 'de couverture de trésorerie';

  // Métriques
  $('metricsRow').style.display = 'grid';
  $('mCapacity').textContent = fmt(capacity);
  $('mBesoin').textContent   = fmt(besoin);

  // AI
  $('aiCard').style.display = 'block';
  $('aiSpinner').style.display = 'inline-block';
  $('aiContent').textContent = '';

  await generateAI(capacity, besoin, mois, isGreen);
}

// ─── AI ────────────────────────────────────────────────────────────────────
async function generateAI(capacity, besoin, mois, isGreen) {
  const prompt = `Tu es le conseiller financier calme et bienveillant d'AB RENOV 35, une entreprise de rénovation.
Génère un commentaire quotidien de trésorerie en 2 phrases max. Style : calme, factuel, professionnel, rassurant, jamais anxiogène.

Données :
- Capacité financière élargie : ${fmt(capacity)}
- Besoin mensuel : ${fmt(besoin)}
- Couverture : ${mois.toFixed(1)} mois
- Statut : ${isGreen ? 'VERT' : 'ROUGE'}

${isGreen
  ? 'Commentaire positif et rassurant. Mets en avant les ' + mois.toFixed(1) + ' mois de couverture comme indicateur clé. Termine par une note apaisante.'
  : 'Factuel et calme. Indique qu\'une vérification est recommandée sans dramatiser.'}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '';
    $('aiSpinner').style.display = 'none';
    $('aiContent').textContent = text || fallback(capacity, besoin, mois, isGreen);
  } catch(e) {
    $('aiSpinner').style.display = 'none';
    $('aiContent').textContent = fallback(capacity, besoin, mois, isGreen);
  }
}

function fallback(capacity, besoin, mois, isGreen) {
  if (isGreen) return `Votre capacité financière élargie est de ${fmt(capacity)}, soit ${mois.toFixed(1)} mois de couverture. Aucun signal d'alerte identifié aujourd'hui.`;
  return `Votre capacité financière élargie (${fmt(capacity)}) est inférieure au besoin mensuel de référence. Une vérification est recommandée.`;
}

// ─── INIT ──────────────────────────────────────────────────────────────────
loadLocal();
loadFromGAS();
</script>
</body>
</html>
