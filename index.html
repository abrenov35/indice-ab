<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sérénité Trésorerie — AB RENOV 35</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #162D49; color: #fff; overflow: hidden; }

.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* HEADER */
.hdr { background: #162D49; padding: 7px 14px 6px; border-bottom: 2px solid #A495C3; flex-shrink: 0; }
.hdr-logo { font-family: 'Century Gothic','Trebuchet MS',sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.06em; }
.hdr-sub { font-size: 0.6rem; color: #C8BFD9; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 1px; }

/* SCROLL BODY */
.body { flex: 1; overflow-y: auto; padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 10px; }

/* INDICATEUR */
.ind { border-radius: 12px; padding: 14px 16px; border: 1.5px solid rgba(255,255,255,0.1); display: none; min-height: 110px; }
.ind.green { background: rgba(255,255,255,0.04); border-color: #2ECC71; border-width: 2px; display: flex; flex-direction: column; }
.ind.red   { background: rgba(255,255,255,0.04); border-color: #E74C3C; border-width: 2px; display: flex; flex-direction: column; }

.ind-header { display: flex; align-items: center; margin-bottom: 12px; }
.ind-statut { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; }
.ind-leds { display: flex; gap: 8px; }



.ind-body { display: flex; align-items: stretch; width: 100%; flex: 1; min-height: 80px; justify-content: space-between; }
.ind-mois { flex: 1; padding-right: 12px; border-right: 1px solid rgba(255,255,255,0.2); text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ind-mois-val { font-size: 2.8rem; font-weight: 900; line-height: 1; letter-spacing: -0.03em; }
.ind.green .ind-mois-val { color: #2ECC71; }
.ind.red   .ind-mois-val { color: #E74C3C; }
.ind-mois-unit { font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.7); }
.ind-mois-lbl { font-size: 0.58rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

.ind-metrics { flex: 2; padding-left: 20px; padding-right: 8px; display: flex; flex-direction: column; justify-content: center; gap: 12px; }
.ind-metric-lbl { font-size: 0.62rem; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; font-weight: 600; }
.ind-metric-val { font-size: 1.25rem; font-weight: 900; color: #ffffff; letter-spacing: -0.02em; }

/* COMMENTAIRE */
.ai { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 14px; border-left: 3px solid #A495C3; display: none; }
.ai-lbl { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #C8BFD9; margin-bottom: 6px; }
.ai-txt { font-size: 0.75rem; line-height: 2.1; color: #fff; font-style: italic; white-space: pre-line; }
.ai-highlight-green { display: inline; background: transparent; color: #2ECC71; font-weight: 700; font-style: normal; }
.ai-highlight-red { display: inline; background: transparent; color: #E74C3C; font-weight: 700; font-style: normal; }

/* FORMULAIRE */
.form { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 14px 14px; }
.form-title { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #fff; margin-bottom: 10px; }
.fields { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field.full { grid-column: span 2; }
.field label { font-size: 0.65rem; font-weight: 600; color: #e0d8f0; }
.field-hint { font-size: 0.6rem; color: rgba(255,255,255,0.5); margin-top: -2px; }
.iw { position: relative; }
.iw input { width: 100%; padding: 9px 26px 9px 10px; background: rgba(255,255,255,0.1); border: 1.5px solid rgba(164,149,195,0.4); border-radius: 8px; color: #fff; font-size: 0.95rem; font-weight: 700; outline: none; -moz-appearance: textfield; caret-color: #7ec8e3; text-align: center; }
.iw input::-webkit-inner-spin-button, .iw input::-webkit-outer-spin-button { -webkit-appearance: none; }
.iw input:focus { border-color: #7ec8e3; background: rgba(126,200,227,0.08); box-shadow: 0 0 0 3px rgba(126,200,227,0.15); }
.iw input::placeholder { color: rgba(255,255,255,0.25); font-weight: 400; }
.iw span { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 0.8rem; pointer-events: none; }

.dec-toggle { display:flex; align-items:center; gap:8px; margin-top:5px; cursor:pointer; user-select:none; }
.dec-toggle-btn { width:34px; height:18px; border-radius:9px; background:#2ECC71; position:relative; transition:background 0.2s; flex-shrink:0; }
.dec-toggle-btn::after { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#fff; top:2px; left:18px; transition:left 0.2s; }
.dec-toggle-btn.off { background:rgba(255,255,255,0.2); }
.dec-toggle-btn.off::after { left:2px; }
#decToggleLbl { font-size:0.62rem; color:rgba(255,255,255,0.7); }

.btn { margin-top: 10px; width: 100%; padding: 12px; background: #A495C3; color: #162D49; font-size: 0.88rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; border: none; border-radius: 9px; cursor: pointer; }
.btn:active { transform: scale(0.98); }

.spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-logo">AB RENOV 35</div>
    <div class="hdr-sub">Indice de Sérénité Trésorerie</div>
  </div>

  <div class="body">

    <!-- INDICATEUR -->
    <div class="ind" id="ind">
      <div class="ind-header">
        <div class="ind-statut" id="indStatut"></div>
      </div>
      <div class="ind-body">
        <div class="ind-mois">
          <div class="ind-mois-val" id="indMois"></div>
          <div class="ind-mois-unit">mois</div>
          <div class="ind-mois-lbl">de couverture</div>
        </div>
        <div class="ind-metrics">
          <div>
            <div class="ind-metric-lbl">Capacité élargie</div>
            <div class="ind-metric-val" id="mCap"></div>
          </div>
          <div>
            <div class="ind-metric-lbl">Besoin mensuel</div>
            <div class="ind-metric-val" id="mBes"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- COMMENTAIRE IA -->
    <div class="ai" id="aiCard">
      <div class="ai-lbl">💬 Commentaire du jour</div>
      <div class="ai-txt" id="aiTxt"></div>
    </div>

    <!-- FORMULAIRE -->
    <div class="form" id="formCard">
      <div class="form-title">Saisie des données</div>
      <div class="fields">
        <div class="field">
          <label>Compte courant</label>
          <div class="iw"><input type="text" inputmode="decimal" id="courant" placeholder="0" inputmode="decimal"><span>€</span></div>
        </div>
        <div class="field">
          <label>Compte épargne</label>
          <div class="iw"><input type="text" inputmode="decimal" id="epargne" placeholder="0" inputmode="decimal"><span>€</span></div>
        </div>
        <div class="field">
          <label>Créances certaines</label>
          <div class="iw"><input type="text" inputmode="decimal" id="creances" placeholder="0" inputmode="decimal"><span>€</span></div>
        </div>
        <div class="field">
          <label>Découvert autorisé</label>
          <div class="iw">
            <input type="text" id="decouvert" value="25 000" readonly tabindex="-1" style="cursor:default;background:rgba(255,255,255,0.1);border-color:rgba(164,149,195,0.4);color:#fff;">
            <span>€</span>
          </div>
          <input type="hidden" id="decouvert_val" value="25000">
          <div class="dec-toggle" onclick="toggleDecouvert()">
            <div class="dec-toggle-btn" id="decToggleBtn"></div>
            <span id="decToggleLbl">Inclus dans le calcul</span>
          </div>
        </div>
        <div class="field full">
          <label>Besoin mensuel de référence</label>
          <div class="iw"><input type="text" inputmode="decimal" id="besoin" value="70000" inputmode="decimal"><span>€</span></div>
        </div>
      </div>
      <button class="btn" onclick="calculate()">Calculer l'indice</button>
    </div>

  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbykyQJ0L8IJ0USn2xDbWB12Wdcap0-mgiuA0ymnvtAQfiDKKksa1JuooevID_NHBjc0/exec';

// Format comptable français : 76 647,00 €
function fmt(n) {
  return new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n) + '\u00a0€';
}

function $(id) { return document.getElementById(id); }

// PERSISTENCE
function loadLocal() {
  [['courant','ist_courant'],['epargne','ist_epargne'],['creances','ist_creances'],
   ['besoin','ist_besoin']].forEach(([id,key]) => {
    const v = localStorage.getItem(key);
    const el = $(id);
    if (v !== null && v !== '') {
      el.dataset.raw = v;
      el.value = new Intl.NumberFormat('fr-FR').format(parseFloat(v));
    } else if (el.value) {
      el.dataset.raw = el.value;
      el.value = new Intl.NumberFormat('fr-FR').format(parseFloat(el.value));
    }
  });
}
function saveLocal() {
  [['courant','ist_courant'],['epargne','ist_epargne'],['creances','ist_creances'],
   ['besoin','ist_besoin']].forEach(([id,key]) => {
    localStorage.setItem(key, $(id).value);
  });
}

async function loadGAS() {
  try {
    const r = await fetch(GAS_URL);
    const d = await r.json();
    if (d.courant !== '' && d.courant !== undefined && d.courant !== null) {
      [['courant',d.courant],['epargne',d.epargne],['creances',d.creances],
       ['besoin',d.besoin]].forEach(([id,val]) => {
        if (val !== '' && val != null) {
          const el = $(id);
          el.dataset.raw = val;
          el.value = new Intl.NumberFormat('fr-FR').format(parseFloat(val));
        }
      });
      saveLocal();
    }
  } catch(e) { /* hors ligne : localStorage déjà chargé */ }
}

async function saveGAS() {
  try {
    const p = new URLSearchParams({
      action:'save',
      courant:$('courant').value, epargne:$('epargne').value,
      creances:$('creances').value, decouvert:'25000',
      besoin:$('besoin').value
    });
    await fetch(GAS_URL + '?' + p.toString(), { mode:'no-cors' });
  } catch(e) {}
}

// CALCULATE
async function calculate() {
  function val(id, def) {
    const el = document.getElementById(id);
    const raw = String(el.dataset.raw || el.value).replace(/[\u00a0 ]/g,'').replace(',','.');
    return parseFloat(raw) || def || 0;
  }
  const courant   = val('courant', 0);
  const epargne   = val('epargne', 0);
  const creances  = val('creances', 0);
  const decouvert = decouvertActif ? 25000 : 0;
  const besoin    = val('besoin', 70000);

  saveLocal();
  saveGAS();

  const capacity = courant + epargne + decouvert + creances;
  const mois     = besoin > 0 ? capacity / besoin : 0;
  const isGreen  = capacity >= besoin;

  // Afficher indicateur
  const ind = $('ind');
  ind.style.display = 'block';
  ind.className = 'ind ' + (isGreen ? 'green' : 'red');
  const borderColor = isGreen ? '#2ECC71' : '#E74C3C';
  ['aiCard','formCard'].forEach(id => {
    const el = $(id);
    if (el) el.style.border = '1.5px solid ' + borderColor;
  });

  $('indStatut').textContent = isGreen ? 'TRÉSORERIE EXCÉDENTAIRE' : 'TRÉSORERIE SOUS TENSION';

  $('indMois').textContent = mois.toFixed(1);
  $('mCap').textContent = fmt(capacity);
  $('mBes').textContent = fmt(besoin);

  // Commentaire IA
  const aiCard = $('aiCard');
  aiCard.style.display = 'block';
  $('aiTxt').innerHTML = '<span class="spinner"></span> Analyse en cours…';

  try {
    const p = new URLSearchParams({ action:'ai', capacity, besoin, mois: mois.toFixed(1), isGreen });
    const res = await fetch(GAS_URL + '?' + p.toString());
    const data = await res.json();
    $('aiTxt').innerHTML = data.text ? formatAI(data.text, isGreen) : fallback(capacity, besoin, mois, isGreen);
  } catch(e) {
    $('aiTxt').innerHTML = fallback(capacity, besoin, mois, isGreen);
  }
}

function formatAI(text, isGreen) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  const last = lines.pop();
  const cls = isGreen ? 'ai-highlight-green' : 'ai-highlight-red';
  return lines.map(l => '▸ ' + l).join('\n') + '\n<span class="' + cls + '">▸ ' + last + '</span>';
}

function fallback(capacity, besoin, mois, isGreen) {
  if (isGreen) {
    return `▸ Capacité financière élargie : ${fmt(capacity)}\n▸ Couverture : ${mois.toFixed(1)} mois de trésorerie disponible.\n<span class="ai-highlight-green">▸ Aucun signal d'alerte identifié aujourd'hui.</span>`;
  }
  return `▸ Capacité financière élargie : ${fmt(capacity)}\n▸ Besoin mensuel de référence : ${fmt(besoin)}\n<span class="ai-highlight-red">▸ Une vérification de la situation est recommandée.</span>`;
}

// FORMAT INPUTS
function formatInput(el) {
  const raw = el.value.replace(/[^0-9,.-]/g,'').replace(',','.');
  const v = parseFloat(raw);
  if (!isNaN(v)) {
    el.dataset.raw = v;
    el.value = new Intl.NumberFormat('fr-FR').format(v);
  }
}
function unformatInput(el) {
  el.value = el.dataset.raw || '';
}
document.querySelectorAll('.iw input[type="text"]:not([readonly])').forEach(el => {
  el.addEventListener('focus', () => unformatInput(el));
  el.addEventListener('blur', () => formatInput(el));
});

// INIT
loadLocal();
loadGAS();
// Format on load
let decouvertActif = true;
function toggleDecouvert() {
  decouvertActif = !decouvertActif;
  const btn = document.getElementById('decToggleBtn');
  const lbl = document.getElementById('decToggleLbl');
  btn.className = 'dec-toggle-btn' + (decouvertActif ? '' : ' off');
  lbl.textContent = decouvertActif ? 'Inclus dans le calcul' : 'Non inclus dans le calcul';
}

// Format all fields on load
function formatAll() {
  document.querySelectorAll('.iw input[type="text"]:not([readonly])').forEach(el => {
    if (el.value) {
      const raw = el.value.replace(/[^0-9.-]/g,'');
      if (raw) {
        el.dataset.raw = raw;
        el.value = new Intl.NumberFormat('fr-FR').format(parseFloat(raw));
      }
    }
  });
  // Always restore readonly field
  const dec = document.getElementById('decouvert');
  if (dec) dec.value = '25 000';
}
setTimeout(formatAll, 100);
</script>
</body>
</html>
