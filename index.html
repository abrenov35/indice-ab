<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sérénité Trésorerie — AB RENOV 35</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #162D49; color: #fff; overflow: hidden; }

.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* HEADER */
.hdr { background: #162D49; padding: 10px 16px 8px; border-bottom: 3px solid #A495C3; flex-shrink: 0; }
.hdr-logo { font-family: 'Century Gothic','Trebuchet MS',sans-serif; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.06em; }
.hdr-sub { font-size: 0.6rem; color: #C8BFD9; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 1px; }

/* SCROLL BODY */
.body { flex: 1; overflow-y: auto; padding: 10px 12px 16px; display: flex; flex-direction: column; gap: 10px; }

/* INDICATEUR */
.ind { border-radius: 14px; padding: 18px 18px; border: 1.5px solid rgba(255,255,255,0.1); display: none; }
.ind.green { background: rgba(255,255,255,0.04); border-color: #2ECC71; border-width: 2px; }
.ind.red   { background: rgba(255,255,255,0.04); border-color: #E74C3C; border-width: 2px; }

.ind-header { display: flex; align-items: center; margin-bottom: 14px; }
.ind-statut { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; }
.ind-leds { display: flex; gap: 8px; }
.ind-leds-col { display: flex; flex-direction: column; gap: 10px; align-items: center; padding: 0 14px; flex-shrink: 0; justify-content: center; }
.led { width: 18px; height: 18px; border-radius: 50%; opacity: 0.2; flex-shrink: 0; }
.led.vert  { background: #2ECC71; }
.led.rouge { background: #E74C3C; }
.led.on { opacity: 1; box-shadow: 0 0 10px currentColor; }
.led.vert.on  { box-shadow: 0 0 10px #2ECC71; }
.led.rouge.on { box-shadow: 0 0 10px #E74C3C; }

.ind-body { display: flex; align-items: center; gap: 0; }
.ind-mois { flex: 0 0 auto; padding-right: 16px; border-right: 1px solid rgba(255,255,255,0.15); text-align: center; }
.ind-mois-val { font-size: 2.8rem; font-weight: 900; line-height: 1; letter-spacing: -0.02em; }
.ind.green .ind-mois-val { color: #2ECC71; }
.ind.red   .ind-mois-val { color: #E74C3C; }
.ind-mois-unit { font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.7); }
.ind-mois-lbl { font-size: 0.58rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

.ind-metrics { flex: 1; padding-left: 18px; display: flex; flex-direction: column; gap: 14px; justify-content: center; }
.ind-metric-lbl { font-size: 0.6rem; color: rgba(255,255,255,0.75); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; font-weight: 600; }
.ind-metric-val { font-size: 1.3rem; font-weight: 900; color: #ffffff; letter-spacing: -0.01em; }

/* COMMENTAIRE */
.ai { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 11px 13px; border-left: 3px solid #A495C3; display: none; }
.ai-lbl { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #C8BFD9; margin-bottom: 6px; }
.ai-txt { font-size: 0.78rem; line-height: 1.6; color: #fff; font-style: italic; }

/* FORMULAIRE */
.form { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 13px 13px 14px; }
.form-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #fff; margin-bottom: 12px; }
.fields { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field.full { grid-column: span 2; }
.field label { font-size: 0.65rem; font-weight: 600; color: #e0d8f0; }
.field-hint { font-size: 0.6rem; color: rgba(255,255,255,0.5); margin-top: -2px; }
.iw { position: relative; }
.iw input { width: 100%; padding: 9px 28px 9px 10px; background: rgba(255,255,255,0.1); border: 1.5px solid rgba(164,149,195,0.4); border-radius: 8px; color: #fff; font-size: 0.95rem; font-weight: 700; outline: none; -moz-appearance: textfield; }
.iw input::-webkit-inner-spin-button, .iw input::-webkit-outer-spin-button { -webkit-appearance: none; }
.iw input:focus { border-color: #A495C3; background: rgba(255,255,255,0.15); }
.iw input::placeholder { color: rgba(255,255,255,0.25); font-weight: 400; }
.iw span { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 0.8rem; pointer-events: none; }

.btn { margin-top: 11px; width: 100%; padding: 13px; background: #A495C3; color: #162D49; font-size: 0.88rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; border: none; border-radius: 9px; cursor: pointer; }
.btn:active { transform: scale(0.98); }

.spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-logo">AB RENOV 35</div>
    <div class="hdr-sub">Indice de Sérénité Trésorerie</div>
  </div>

  <div class="body">

    <!-- INDICATEUR -->
    <div class="ind" id="ind">
      <div class="ind-header">
        <div class="ind-statut" id="indStatut"></div>
      </div>
      <div class="ind-body">
        <div class="ind-mois">
          <div class="ind-mois-val" id="indMois"></div>
          <div class="ind-mois-unit">mois</div>
          <div class="ind-mois-lbl">de couverture</div>
        </div>
        <div class="ind-leds-col">
          <div class="led vert" id="ledVert"></div>
          <div class="led rouge" id="ledRouge"></div>
        </div>
        <div class="ind-metrics">
          <div>
            <div class="ind-metric-lbl">Capacité élargie</div>
            <div class="ind-metric-val" id="mCap"></div>
          </div>
          <div>
            <div class="ind-metric-lbl">Besoin mensuel</div>
            <div class="ind-metric-val" id="mBes"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- COMMENTAIRE IA -->
    <div class="ai" id="aiCard">
      <div class="ai-lbl">💬 Commentaire du jour</div>
      <div class="ai-txt" id="aiTxt"></div>
    </div>

    <!-- FORMULAIRE -->
    <div class="form">
      <div class="form-title">Saisie des données</div>
      <div class="fields">
        <div class="field">
          <label>Compte courant</label>
          <div class="iw"><input type="number" id="courant" placeholder="0" inputmode="decimal"><span>€</span></div>
        </div>
        <div class="field">
          <label>Compte épargne</label>
          <div class="iw"><input type="number" id="epargne" placeholder="0" inputmode="decimal"><span>€</span></div>
        </div>
        <div class="field">
          <label>Créances certaines</label>
          <div class="iw"><input type="number" id="creances" placeholder="0" inputmode="decimal"><span>€</span></div>
        </div>
        <div class="field">
          <label>Découvert autorisé</label>
          <div class="iw">
            <input type="text" id="decouvert" value="25 000" readonly style="opacity:0.5;cursor:default;background:rgba(255,255,255,0.04);border-color:rgba(164,149,195,0.2);">
            <span>€</span>
          </div>
          <input type="hidden" id="decouvert_val" value="25000">
        </div>
        <div class="field full">
          <label>Besoin mensuel de référence</label>
          <div class="iw"><input type="number" id="besoin" value="70000" inputmode="decimal"><span>€</span></div>
        </div>
      </div>
      <button class="btn" onclick="calculate()">Calculer l'indice</button>
    </div>

  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbykyQJ0L8IJ0USn2xDbWB12Wdcap0-mgiuA0ymnvtAQfiDKKksa1JuooevID_NHBjc0/exec';

// Format comptable français : 76 647,00 €
function fmt(n) {
  return new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n) + '\u00a0€';
}

function $(id) { return document.getElementById(id); }

// PERSISTENCE
function loadLocal() {
  [['courant','ist_courant'],['epargne','ist_epargne'],['creances','ist_creances'],
   ['besoin','ist_besoin']].forEach(([id,key]) => {
    const v = localStorage.getItem(key);
    if (v !== null && v !== '') $(id).value = v;
  });
}
function saveLocal() {
  [['courant','ist_courant'],['epargne','ist_epargne'],['creances','ist_creances'],
   ['besoin','ist_besoin']].forEach(([id,key]) => {
    localStorage.setItem(key, $(id).value);
  });
}

async function loadGAS() {
  try {
    const r = await fetch(GAS_URL);
    const d = await r.json();
    if (d.courant !== '' && d.courant !== undefined && d.courant !== null) {
      [['courant',d.courant],['epargne',d.epargne],['creances',d.creances],
       ['decouvert',d.decouvert],['besoin',d.besoin]].forEach(([id,val]) => {
        if (val !== '' && val != null) $(id).value = val;
      });
      saveLocal();
    }
  } catch(e) { /* hors ligne : localStorage déjà chargé */ }
}

async function saveGAS() {
  try {
    const p = new URLSearchParams({
      action:'save',
      courant:$('courant').value, epargne:$('epargne').value,
      creances:$('creances').value, decouvert:'25000',
      besoin:$('besoin').value
    });
    await fetch(GAS_URL + '?' + p.toString(), { mode:'no-cors' });
  } catch(e) {}
}

// CALCULATE
async function calculate() {
  function val(id, def) {
    const el = document.getElementById(id);
    const raw = String(el.dataset.raw || el.value).replace(/[\u00a0 ]/g,'').replace(',','.');
    return parseFloat(raw) || def || 0;
  }
  const courant   = val('courant', 0);
  const epargne   = val('epargne', 0);
  const creances  = val('creances', 0);
  const decouvert = 25000;
  const besoin    = val('besoin', 70000);

  saveLocal();
  saveGAS();

  const capacity = courant + epargne + decouvert + creances;
  const mois     = besoin > 0 ? capacity / besoin : 0;
  const isGreen  = capacity >= besoin;

  // Afficher indicateur
  const ind = $('ind');
  ind.style.display = 'block';
  ind.className = 'ind ' + (isGreen ? 'green' : 'red');

  $('indStatut').textContent = isGreen ? 'TRÉSORERIE EXCÉDENTAIRE' : 'TRÉSORERIE SOUS TENSION';
  $('ledVert').className  = 'led vert'  + (isGreen  ? ' on' : '');
  $('ledRouge').className = 'led rouge' + (!isGreen ? ' on' : '');
  $('indMois').textContent = mois.toFixed(1);
  $('mCap').textContent = fmt(capacity);
  $('mBes').textContent = fmt(besoin);

  // Commentaire IA
  const aiCard = $('aiCard');
  aiCard.style.display = 'block';
  $('aiTxt').innerHTML = '<span class="spinner"></span> Analyse en cours…';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1000,
        messages: [{ role: 'user', content:
          `Tu es conseiller financier bienveillant d'AB RENOV 35. Commentaire trésorerie en 2 phrases max, calme, factuel, rassurant.
Capacité élargie : ${fmt(capacity)} | Besoin mensuel : ${fmt(besoin)} | Couverture : ${mois.toFixed(1)} mois | Statut : ${isGreen ? 'EXCÉDENTAIRE' : 'SOUS TENSION'}.
${isGreen ? 'Mets en avant les '+mois.toFixed(1)+' mois. Termine positivement.' : 'Factuel et non alarmiste. Recommande une vérification.'}`
        }]
      })
    });
    const data = await res.json();
    $('aiTxt').textContent = data.content?.map(b => b.text||'').join('') || fallback(capacity,besoin,mois,isGreen);
  } catch(e) {
    $('aiTxt').textContent = fallback(capacity, besoin, mois, isGreen);
  }
}

function fallback(capacity, besoin, mois, isGreen) {
  return isGreen
    ? `Capacité élargie de ${fmt(capacity)}, soit ${mois.toFixed(1)} mois de couverture. Aucun signal d'alerte identifié.`
    : `Capacité élargie de ${fmt(capacity)}, inférieure au besoin mensuel de ${fmt(besoin)}. Une vérification est recommandée.`;
}

// FORMAT INPUTS
function formatInput(el) {
  const v = parseFloat(el.dataset.raw || el.value.replace(/\s/g,''));
  if (!isNaN(v)) {
    el.dataset.raw = v;
    el.value = new Intl.NumberFormat('fr-FR').format(v);
  }
}
function unformatInput(el) {
  const raw = el.dataset.raw || el.value.replace(/\s/g,'').replace(/,/g,'.');
  el.value = raw;
}
document.querySelectorAll('.iw input[type="number"]').forEach(el => {
  el.addEventListener('focus', () => unformatInput(el));
  el.addEventListener('blur', () => formatInput(el));
});

// INIT
loadLocal();
loadGAS();
// Format on load
setTimeout(() => {
  document.querySelectorAll('.iw input[type="number"]').forEach(el => formatInput(el));
}, 300);
</script>
</body>
</html>
